<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
  <title>QR Code Scanner · Auto-Open Links</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      padding: 16px;
      margin: 0;
    }

    .scanner-card {
      max-width: 560px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 40px;
      padding: 28px 24px 32px;
      box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(255, 255, 255, 0.08);
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h2 {
      color: white;
      font-weight: 500;
      font-size: 2rem;
      letter-spacing: -0.3px;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.2;
    }

    .subhead {
      color: #b4c2f0;
      margin: 0 0 4px 0;
      font-size: 1rem;
      border-left: 4px solid #5f7ef2;
      padding-left: 18px;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    /* 扫描器容器 */
    .qr-viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0b0f18;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06), 0 18px 30px -12px black;
      margin: 4px 0 6px;
    }

    #scannerVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1); /* 镜像效果，更自然 */
    }

    .scan-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(6, 10, 20, 0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 10;
      transition: opacity 0.3s ease, visibility 0.3s;
      visibility: visible;
    }

    .scan-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .scan-icon {
      font-size: 68px;
      margin-bottom: 12px;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
    }

    .overlay-text {
      color: white;
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 10px;
      text-shadow: 0 2px 6px black;
    }

    .overlay-hint {
      color: #cdd9ff;
      font-size: 1rem;
      margin-bottom: 28px;
      background: rgba(0,0,0,0.3);
      padding: 6px 18px;
      border-radius: 30px;
    }

    .btn-primary {
      background: #3f6ef0;
      border: none;
      color: white;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 60px;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(47, 91, 234, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      letter-spacing: 0.3px;
    }

    .btn-primary:hover {
      background: #517ef0;
      transform: scale(1.03);
      box-shadow: 0 14px 28px #2f5bea80;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    /* 扫描框装饰 */
    .scan-frame {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      bottom: 14px;
      border: 2px solid rgba(95, 126, 242, 0.45);
      border-radius: 24px;
      pointer-events: none;
      z-index: 2;
      box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.25);
    }

    .corner {
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: #7b9cf0;
      border-style: solid;
      z-index: 4;
      filter: drop-shadow(0 0 6px #2f5bea);
    }

    .corner-tl { top: 10px; left: 10px; border-width: 4px 0 0 4px; border-radius: 10px 0 0 0; }
    .corner-tr { top: 10px; right: 10px; border-width: 4px 4px 0 0; border-radius: 0 10px 0 0; }
    .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 4px 4px; border-radius: 0 0 0 10px; }
    .corner-br { bottom: 10px; right: 10px; border-width: 0 4px 4px 0; border-radius: 0 0 10px 0; }

    .control-bar {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 4px 0 2px;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #e4ebff;
      padding: 12px 26px;
      border-radius: 50px;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      flex: 0 1 auto;
      letter-spacing: 0.2px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.18);
      color: white;
      border-color: rgba(255,255,255,0.3);
    }

    #stopScanner {
      display: none;
    }

    /* 结果显示卡片 —— 这就是新增的框框，清晰显示扫描内容 */
    .scan-result-box {
      background: rgba(16, 22, 40, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      padding: 18px 20px;
      margin: 8px 0 0;
      color: #eef3ff;
      font-size: 0.98rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      transition: all 0.25s;
      word-break: break-word;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8e9fc7;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .result-content {
      background: #0b101f;
      border-radius: 16px;
      padding: 14px 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1rem;
      border-left: 4px solid #5f7ef2;
      color: #d4e0ff;
      word-break: break-all;
      line-height: 1.5;
      transition: background 0.2s;
    }

    .result-content a {
      color: #aac8ff;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 500;
    }

    .link-badge {
      background: #2f5bea30;
      color: #bdd3ff;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      border: 1px solid #5f7ef250;
    }

    .status-area {
      margin-top: 4px;
      padding: 12px 16px;
      background: rgba(15, 22, 41, 0.8);
      border-radius: 20px;
      color: #b7c9ff;
      font-size: 0.9rem;
      border-left: 5px solid #5f7ef2;
      word-break: break-word;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-note {
      margin-top: 8px;
      text-align: center;
      color: #6a7aa3;
      font-size: 0.8rem;
      letter-spacing: 0.2px;
    }

    canvas {
      display: none;
    }

    @media (max-width: 480px) {
      .scanner-card {
        padding: 20px 16px 24px;
      }
    }
  </style>
  <!-- jsQR library -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
<div class="scanner-card">
  <h2>
    <span>📸 Link Scanner</span>
  </h2>
  <div class="subhead">Scan QR code · Auto-open webpages</div>

  <!-- 扫描区域 -->
  <div class="qr-viewport">
    <video id="scannerVideo" playsinline></video>
    
    <div class="scan-frame"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- 覆盖层 -->
    <div id="scannerOverlay" class="scan-overlay">
      <div class="scan-icon">📷</div>
      <div class="overlay-text">Camera ready</div>
      <div class="overlay-hint">Position QR code inside frame</div>
      <button class="btn-primary" id="startScannerBtn">🔍 Start Scanning</button>
    </div>
  </div>

  <!-- 控制按钮组 -->
  <div class="control-bar">
    <button class="btn-secondary" id="stopScanner">⏹️ Stop Camera</button>
    <button class="btn-secondary" id="resetScannerBtn" style="display: none;">🔄 Scan Again</button>
  </div>

  <!-- 🆕 核心：显示QR扫描出的文字/链接的框框 -->
  <div class="scan-result-box" id="scanResultBox">
    <div class="result-label">
      <span>🔍 Scanned Content</span>
    </div>
    <div class="result-content" id="resultText">
      <span style="color: #7b8bb0;">Waiting for scan…</span>
    </div>
    <div id="linkIndicator" style="display: none;" class="link-badge">
      🌐 Link detected — auto-opening
    </div>
  </div>

  <!-- 状态栏 -->
  <div class="status-area" id="statusDisplay">
    ⚡ Press "Start Scanning" and allow camera.<br>Links will open automatically.
  </div>
  <div class="footer-note">
    Auto-redirect after scan · Link QR only
  </div>
</div>

<canvas id="scannerCanvas"></canvas>

<script>
  (function(){
    "use strict";

    // DOM elements
    const video = document.getElementById('scannerVideo');
    const canvas = document.getElementById('scannerCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const overlay = document.getElementById('scannerOverlay');
    const startBtn = document.getElementById('startScannerBtn');
    const stopBtn = document.getElementById('stopScanner');
    const resetBtn = document.getElementById('resetScannerBtn');
    const statusDisplay = document.getElementById('statusDisplay');
    const resultTextDiv = document.getElementById('resultText');
    const linkIndicator = document.getElementById('linkIndicator');
    const scanResultBox = document.getElementById('scanResultBox');

    // State
    let stream = null;
    let scanningActive = false;
    let animationFrame = null;
    let lastScannedText = '';
    let scanCooldown = false;
    const COOLDOWN_MS = 1800;

    function setStatus(text, isGood = true) {
      statusDisplay.innerHTML = text;
    }

    // 更新显示框内容 (文字/链接)
    function updateResultDisplay(qrText, isLink = false) {
      if (!qrText) {
        resultTextDiv.innerHTML = '<span style="color: #7b8bb0;">Waiting for scan…</span>';
        linkIndicator.style.display = 'none';
        return;
      }
      
      // 转义HTML防止XSS，同时保留链接可点击
      const escapedText = qrText.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      
      if (isLink) {
        // 显示为可点击链接
        resultTextDiv.innerHTML = `<a href="${escapedText}" target="_blank" rel="noopener noreferrer">${escapedText}</a>`;
        linkIndicator.style.display = 'inline-flex';
      } else {
        resultTextDiv.innerHTML = `<span style="color:#d4e0ff;">${escapedText}</span>`;
        linkIndicator.style.display = 'none';
      }
    }

    function isValidHttpUrl(str) {
      if (!str) return false;
      const trimmed = str.trim();
      try {
        const url = new URL(trimmed);
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch (_) {
        if (/^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(\/\S*)?$/.test(trimmed)) {
          try {
            new URL('https://' + trimmed);
            return true;
          } catch(e) { return false; }
        }
        return false;
      }
    }

    function handleScannedContent(qrText) {
      const trimmed = qrText.trim();
      if (!trimmed) return;

      // 更新界面显示框 (总是显示最新扫描内容)
      const isLink = isValidHttpUrl(trimmed);
      updateResultDisplay(trimmed, isLink);

      // 冷却/重复检查
      if (lastScannedText === trimmed && scanCooldown) {
        console.log('Cooldown active, same content ignored.');
        return;
      }

      if (isLink) {
        setStatus(`✅ Link found. Opening in new tab…<br><a href="${trimmed}" target="_blank">${trimmed}</a>`);
        lastScannedText = trimmed;
        scanCooldown = true;
        
        const newWin = window.open(trimmed, '_blank');
        if (!newWin) {
          setStatus(`⚠️ Pop-up blocked. <a href="${trimmed}" target="_blank">Click to open manually</a>`, false);
        }
        
        // 扫描到链接后停止相机 (保持结果可见)
        stopScanningAndCamera();
        stopBtn.style.display = 'none';
        resetBtn.style.display = 'inline-flex';
        
        setTimeout(() => { scanCooldown = false; }, COOLDOWN_MS);
      } else {
        setStatus(`📋 Scanned text (not a link): "${trimmed.substring(0, 45)}${trimmed.length>45?'…':''}"`, false);
        lastScannedText = trimmed;
        scanCooldown = true;
        setTimeout(() => { scanCooldown = false; }, 1200);
      }
    }

    function scanTick() {
      if (!scanningActive) {
        animationFrame = null;
        return;
      }

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        try {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "dontInvert",
          });
          
          if (code && code.data) {
            handleScannedContent(code.data);
          }
        } catch (e) {
          console.warn('jsQR error:', e);
        }
      }

      if (scanningActive) {
        animationFrame = requestAnimationFrame(scanTick);
      } else {
        animationFrame = null;
      }
    }

    function stopScanningAndCamera() {
      scanningActive = false;
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
      
      overlay.classList.remove('hidden');
      const overlayText = overlay.querySelector('.overlay-text');
      if (overlayText) overlayText.textContent = 'Camera stopped';
      const hint = overlay.querySelector('.overlay-hint');
      if (hint) hint.textContent = 'Press Start to scan again';
      
      startBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
      // 不自动清空结果框，保留最后扫描内容
    }

    async function startScanner() {
      if (stream) {
        stopScanningAndCamera();
      }

      lastScannedText = '';
      scanCooldown = false;
      // 不清空结果框，但可以显示等待状态 (保留旧数据或重置)
      // 为了清晰，启动时展示等待信息
      updateResultDisplay('', false);
      
      try {
        const newStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        
        stream = newStream;
        video.srcObject = stream;
        video.setAttribute('playsinline', '');
        
        await new Promise((resolve) => {
          video.onloadedmetadata = () => resolve();
        });
        
        await video.play();
        
        overlay.classList.add('hidden');
        startBtn.style.display = 'none';
        stopBtn.style.display = 'inline-flex';
        resetBtn.style.display = 'none';
        
        scanningActive = true;
        setStatus('📡 Scanning — point camera at QR code. Link opens automatically.');
        
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(scanTick);
        
      } catch (error) {
        console.error('Camera error:', error);
        setStatus('❌ Cannot access camera. Please grant permission.', false);
        overlay.classList.remove('hidden');
        const overlayText = overlay.querySelector('.overlay-text');
        if (overlayText) overlayText.textContent = 'Camera unavailable';
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        scanningActive = false;
        stream = null;
        updateResultDisplay('', false);
      }
    }

    function resetAndRestart() {
      if (stream) {
        stopScanningAndCamera();
      }
      lastScannedText = '';
      scanCooldown = false;
      
      overlay.classList.remove('hidden');
      const overlayText = overlay.querySelector('.overlay-text');
      if (overlayText) overlayText.textContent = 'Ready to scan';
      const hint = overlay.querySelector('.overlay-hint');
      if (hint) hint.textContent = 'Place QR code inside frame';
      
      startBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
      resetBtn.style.display = 'none';
      
      setStatus('🔄 Ready. Press "Start Scanning".');
      updateResultDisplay('', false);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Event listeners
    startBtn.addEventListener('click', (e) => {
      e.preventDefault();
      startScanner();
    });

    stopBtn.addEventListener('click', (e) => {
      e.preventDefault();
      stopScanningAndCamera();
      resetBtn.style.display = 'inline-flex';
      stopBtn.style.display = 'none';
      startBtn.style.display = 'none';
      setStatus('⏸️ Scanning stopped manually.');
    });

    resetBtn.addEventListener('click', (e) => {
      e.preventDefault();
      resetAndRestart();
    });

    window.addEventListener('load', () => {
      resetAndRestart();
    });

    window.addEventListener('beforeunload', () => {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
    });
  })();
</script>
</body>
</html>
