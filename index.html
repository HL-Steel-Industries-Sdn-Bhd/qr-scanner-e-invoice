<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>QR 码扫描器 · 自动打开链接</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 16px;
    }

    .scanner-card {
      max-width: 560px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 36px;
      padding: 28px 24px 32px;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.5);
      transition: all 0.2s;
    }

    h2 {
      color: white;
      font-weight: 500;
      font-size: 1.9rem;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subhead {
      color: #a6b4e0;
      margin-bottom: 24px;
      font-size: 1rem;
      border-left: 3px solid #5f7ef2;
      padding-left: 16px;
    }

    /* 扫描器容器 */
    .qr-viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0e121f;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05), 0 12px 24px -8px black;
      margin-bottom: 22px;
    }

    #scannerVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .scan-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(8, 12, 24, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 5;
      transition: opacity 0.25s;
    }

    .scan-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .scan-icon {
      font-size: 64px;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .overlay-text {
      color: white;
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .overlay-hint {
      color: #b1c3ff;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .btn-primary {
      background: #3f6ef0;
      border: none;
      color: white;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 60px;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(47, 91, 234, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: 0.15s;
      backdrop-filter: blur(5px);
    }

    .btn-primary:hover {
      background: #517ef0;
      transform: scale(1.02);
      box-shadow: 0 10px 24px #2f5bea80;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    /* 扫描框装饰 (静态视觉) */
    .scan-frame {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      bottom: 16px;
      border: 2px solid rgba(95, 126, 242, 0.5);
      border-radius: 20px;
      pointer-events: none;
      z-index: 2;
      box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.2);
    }

    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #5f9ef2;
      border-style: solid;
      z-index: 3;
    }

    .corner-tl { top: 12px; left: 12px; border-width: 4px 0 0 4px; border-radius: 8px 0 0 0; }
    .corner-tr { top: 12px; right: 12px; border-width: 4px 4px 0 0; border-radius: 0 8px 0 0; }
    .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 4px 4px; border-radius: 0 0 0 8px; }
    .corner-br { bottom: 12px; right: 12px; border-width: 0 4px 4px 0; border-radius: 0 0 8px 0; }

    /* 控制栏 */
    .control-bar {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-top: 8px;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #e0e7ff;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: 0.15s;
      flex: 0 1 auto;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    #stopScanner {
      display: none;  /* 默认隐藏，启动相机后显示 */
    }

    .status-area {
      margin-top: 24px;
      padding: 14px 18px;
      background: #0f1629;
      border-radius: 22px;
      color: #b7c9ff;
      font-size: 0.95rem;
      border-left: 5px solid #5f7ef2;
      word-break: break-word;
    }

    .status-area a {
      color: #aac8ff;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: #6a7aa3;
      font-size: 0.8rem;
    }

    canvas {
      display: none;
    }
  </style>
  <!-- jsQR 库 (轻量级二维码解析) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
<div class="scanner-card">
  <h2>
    <span>📸 链接扫描</span>
  </h2>
  <div class="subhead">扫描 QR 码 · 自动打开网页</div>

  <!-- 扫描区域 -->
  <div class="qr-viewport">
    <!-- 摄像头画面 -->
    <video id="scannerVideo" playsinline></video>
    
    <!-- 静态扫描框装饰 -->
    <div class="scan-frame"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- 覆盖层：提示/启动 -->
    <div id="scannerOverlay" class="scan-overlay">
      <div class="scan-icon">📷</div>
      <div class="overlay-text">相机待启动</div>
      <div class="overlay-hint">将二维码置于框内</div>
      <button class="btn-primary" id="startScannerBtn">🔍 启动扫描</button>
    </div>
  </div>

  <!-- 控制按钮组 -->
  <div class="control-bar">
    <button class="btn-secondary" id="stopScanner">⏹️ 停止相机</button>
    <button class="btn-secondary" id="resetScannerBtn" style="display: none;">🔄 重新扫描</button>
  </div>

  <!-- 状态/结果展示区 -->
  <div class="status-area" id="statusDisplay">
    ⚡ 点击「启动扫描」并授权摄像头<br>扫描到链接将自动新标签页打开。
  </div>
  <div class="footer-note">
    扫描后自动跳转 · 仅解析链接 QR
  </div>
</div>

<!-- 隐藏 canvas 用于 jsQR 解析 -->
<canvas id="scannerCanvas"></canvas>

<script>
  (function(){
    "use strict";

    // DOM 元素
    const video = document.getElementById('scannerVideo');
    const canvas = document.getElementById('scannerCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const overlay = document.getElementById('scannerOverlay');
    const startBtn = document.getElementById('startScannerBtn');
    const stopBtn = document.getElementById('stopScanner');
    const resetBtn = document.getElementById('resetScannerBtn');
    const statusDisplay = document.getElementById('statusDisplay');

    // 状态变量
    let stream = null;                // MediaStream
    let scanningActive = false;       // 是否正在循环扫描
    let animationFrame = null;        // requestAnimationFrame id
    let lastScannedText = '';         // 避免短时间内重复打开同一链接
    let scanCooldown = false;         // 防止连续弹窗

    // ---------- 辅助函数 ----------
    function setStatus(text, isGood = true) {
      statusDisplay.innerHTML = text;
      // 简单样式 (不加额外类，保留干净)
    }

    // 检查是否为有效URL (并确保是http/https，也支持自定义协议但以防万一)
    function isValidHttpUrl(str) {
      // 宽松匹配: 以 http:// https:// 开头，或者包含常见域名格式
      if (!str) return false;
      const trimmed = str.trim();
      // 尝试构造 URL
      try {
        const url = new URL(trimmed);
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch (_) {
        // 如果不是标准URL，但可能是 "example.com/page" 之类的? 但我们希望是完整链接
        // 额外判断：如果包含 . 且没有空格，尝试加https再测
        if (/^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(\/\S*)?$/.test(trimmed)) {
          try {
            const url2 = new URL('https://' + trimmed);
            return true;
          } catch(e) { return false; }
        }
        return false;
      }
    }

    // 处理扫描结果：如果内容是链接，在新标签页打开；否则显示提示
    function handleScannedContent(qrText) {
      const trimmed = qrText.trim();
      
      // 防止连续扫描同一个码不停开标签
      if (lastScannedText === trimmed && scanCooldown) {
        console.log('相同内容冷却中，忽略');
        return;
      }

      if (!trimmed) return;

      // 判断是否是网址
      if (isValidHttpUrl(trimmed)) {
        // 更新状态
        setStatus(`✅ 扫描到链接:<br><a href="${trimmed}" target="_blank">${trimmed}</a><br>正在新标签页打开……`);
        lastScannedText = trimmed;
        scanCooldown = true;
        
        // 打开新标签页
        const newWin = window.open(trimmed, '_blank');
        if (!newWin) {
          setStatus(`⚠️ 浏览器可能阻止了弹窗。<br>🔗 <a href="${trimmed}" target="_blank">点击手动打开链接</a>`, false);
        } else {
          // 新窗口打开成功
        }

        // 停止扫描 (可选，但通常扫描到链接后暂停比较好，避免重复)
        stopScanningAndCamera();
        // 显示重置按钮，隐藏停止按钮
        stopBtn.style.display = 'none';
        resetBtn.style.display = 'inline-block';
        
        // 3秒后冷却重置 (但已经停止扫描了，无所谓)
        setTimeout(() => { scanCooldown = false; }, 2000);
      } else {
        // 不是链接，提示内容
        setStatus(`📋 扫描内容 (非链接): "${trimmed.substring(0, 50)}${trimmed.length>50?'…':''}"<br>请扫描包含网址的二维码`, false);
        lastScannedText = trimmed;
        // 不是链接，不打开，但仍然记录冷却避免反复提示
        scanCooldown = true;
        setTimeout(() => { scanCooldown = false; }, 1200);
      }
    }

    // ---------- 扫描循环 (基于 requestAnimationFrame) ----------
    function scanTick() {
      if (!scanningActive) {
        animationFrame = null;
        return;
      }

      // 确保视频已就绪
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        // 设置 canvas 尺寸与视频一致
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // 绘制当前帧
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        try {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "dontInvert",
          });
          
          if (code && code.data) {
            // 解析成功
            handleScannedContent(code.data);
            // 注意: handleScannedContent 里可能调用了 stopScanningAndCamera 将 scanningActive 设为 false
            // 如果停止了，就不再继续 requestAnimationFrame
          }
        } catch (e) {
          console.warn('jsQR 处理出错:', e);
        }
      }

      // 继续下一帧 (如果仍在活跃状态)
      if (scanningActive) {
        animationFrame = requestAnimationFrame(scanTick);
      } else {
        animationFrame = null;
      }
    }

    // 停止扫描循环并释放摄像头
    function stopScanningAndCamera() {
      scanningActive = false;
      
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }

      // 关闭摄像头流
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      
      video.srcObject = null;
      
      // 显示覆盖层（但不完全隐藏视频, 让用户看到停止状态）
      overlay.classList.remove('hidden');
      startBtn.style.display = 'inline-block';  // 可重新启动
      stopBtn.style.display = 'none';
      // 重置按钮会在扫描到链接后显示，如果手动停止我们也可以显示重置(重新开始)按钮
      if (resetBtn.style.display !== 'inline-block') {
        // 但保留 reset 按钮如果之前出现过
      }
      // 改变覆盖层文字
      const overlayText = overlay.querySelector('.overlay-text');
      if (overlayText) overlayText.textContent = '相机已停止';
      const hint = overlay.querySelector('.overlay-hint');
      if (hint) hint.textContent = '点击「启动扫描」重新开始';
      
      setStatus('⏸️ 相机已关闭。点击启动扫描继续。');
    }

    // 启动摄像头 + 扫描循环
    async function startScanner() {
      // 如果已经有流先停止
      if (stream) {
        stopScanningAndCamera();
      }

      // 清空上次扫描记录
      lastScannedText = '';
      scanCooldown = false;
      
      try {
        // 请求后置摄像头 (环境)
        const newStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        
        stream = newStream;
        video.srcObject = stream;
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        
        // 等待视频元数据加载
        await new Promise((resolve) => {
          video.onloadedmetadata = () => {
            resolve();
          };
        });
        
        await video.play();
        
        // 隐藏覆盖层，显示视频
        overlay.classList.add('hidden');
        startBtn.style.display = 'none';
        stopBtn.style.display = 'inline-block';
        resetBtn.style.display = 'none';   // 开始扫描后隐藏重置
        
        // 激活扫描标志
        scanningActive = true;
        
        // 更新状态
        setStatus('📡 扫描中 — 将二维码对准摄像头，链接会自动打开');
        
        // 启动 requestAnimationFrame 循环
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(scanTick);
        
      } catch (error) {
        console.error('摄像头错误:', error);
        setStatus('❌ 无法访问摄像头。请授予权限或检查设备。', false);
        overlay.classList.remove('hidden');
        const overlayText = overlay.querySelector('.overlay-text');
        if (overlayText) overlayText.textContent = '摄像头不可用';
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        scanningActive = false;
        stream = null;
      }
    }

    // 重置/重新开始 (跟启动类似，但会强制重置界面)
    function resetAndRestart() {
      // 清理之前的任何状态
      if (stream) {
        stopScanningAndCamera();
      }
      lastScannedText = '';
      scanCooldown = false;
      
      // 确保UI统一
      overlay.classList.remove('hidden');
      const overlayText = overlay.querySelector('.overlay-text');
      if (overlayText) overlayText.textContent = '准备扫描';
      const hint = overlay.querySelector('.overlay-hint');
      if (hint) hint.textContent = '将二维码置于框内';
      
      startBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
      resetBtn.style.display = 'none';
      
      setStatus('🔄 就绪。点击「启动扫描」开始');
      
      // 清空canvas残留
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // ---------- 事件绑定 ----------
    startBtn.addEventListener('click', (e) => {
      e.preventDefault();
      startScanner();
    });

    stopBtn.addEventListener('click', (e) => {
      e.preventDefault();
      stopScanningAndCamera();
      // 停止后显示重置按钮以便重新开始
      resetBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
      startBtn.style.display = 'none';
      setStatus('⏸️ 扫描已手动停止');
    });

    resetBtn.addEventListener('click', (e) => {
      e.preventDefault();
      resetAndRestart();
    });

    // 如果用户在未启动时点击重置也可以调用
    // 确保页面加载完成后，如果没有流，reset隐藏，但显示启动
    window.addEventListener('load', () => {
      // 初始状态：未启动
      resetAndRestart();  // 设置一致UI
    });

    // 额外处理：如果页面卸载时释放摄像头
    window.addEventListener('beforeunload', () => {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
    });

    // 让用户也可以再次从覆盖层启动 (按钮已包含)
    // 对可能的小屏幕优化
  })();
</script>
</body>
</html>
